<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow — Create Account</title>
    <meta name="description" content="Register for TaskFlow to start managing your tasks." />
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="auth-bg">

    <main class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">✅</div>
            <h1>TaskFlow</h1>
            <p>Create your free account</p>
        </div>

        <div id="error-msg" class="form-error" role="alert"></div>

        <form id="register-form" novalidate>
            <div class="form-group">
                <label for="name">Full name</label>
                <input id="name" type="text" placeholder="John Doe" autocomplete="name" required />
            </div>
            <div class="form-group">
                <label for="email">Email address</label>
                <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="At least 6 characters" autocomplete="new-password"
                    required minlength="6" />
            </div>
            <button id="register-btn" type="submit" class="btn btn-primary">
                Create account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </main>

    <script type="module">
        import { handleRegister, redirectIfLoggedIn } from './js/auth.js';

        redirectIfLoggedIn();

        const form = document.getElementById('register-form');
        const btn = document.getElementById('register-btn');
        const errMsg = document.getElementById('error-msg');

        function showError(msg) {
            errMsg.textContent = msg;
            errMsg.classList.add('visible');
        }

        function clearError() {
            errMsg.classList.remove('visible');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!name || !email || !password) {
                showError('Please fill in all fields.');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account…';

            try {
                await handleRegister(name, email, password);
            } catch (err) {
                showError(err.message || 'Registration failed. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Create account';
            }
        });
    </script>
</body>

</html>
