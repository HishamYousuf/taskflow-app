# ==============================================
# APPLICATION CONFIGURATION
# ==============================================
spring.application.name=TaskFlow
server.port=${PORT:8080}

# ==============================================
# MYSQL DATASOURCE  (set via environment variables)
# Local dev: set DB_URL / DB_USERNAME / DB_PASSWORD in IntelliJ run config
# Production: set them in Render dashboard
# ==============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Aiven MySQL requires SSL — safe for local MySQL too (just ignored if not supported)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# ==============================================
# JPA / HIBERNATE
# ==============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ==============================================
# JWT CONFIGURATION
# ==============================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# ==============================================
# JACKSON JSON
# ==============================================
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ==============================================
# DEVTOOLS (disabled in production automatically)
# ==============================================
spring.devtools.restart.enabled=false
